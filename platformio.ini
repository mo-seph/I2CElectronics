; I2CElectronics PlatformIO configuration
;
; Environments:
;   peripheral-s3      : Waveshare ESP32-S3-Zero Peripheral (default)
;   peripheral-s3-test : Minimal I2C slave smoke-test (no LittleFS/elements)
;   central            : Waveshare ESP32-S3-Zero Central
;
; All environments target the Waveshare ESP32-S3-Zero (S3FN4R2: 4MB flash +
; 2MB QSPI PSRAM).  Shared code lives in lib/AOElectronics and is picked up
; automatically by all envs.  Env-specific code lives in src/peripheral,
; src/central, or src/i2c-test and is selected via build_src_filter.
;
; See: https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = peripheral-s3

; ---------- Common to all environments ----------
[env]
; espressif32 6.9.0 ships arduino-esp32 2.0.17 (IDF 4.4.x).
; platform_packages pins the framework to the original 3.20017.0 release
; (Jun 2024) rather than the later 3.20017.241212+sha.dcc1105b rebuild
; (Dec 2024) which appears to have regressions in Wire slave mode on S3.
platform = espressif32 @ 6.9.0
platform_packages =
    framework-arduinoespressif32 @ ==3.20017.0
framework = arduino
monitor_speed = 115200
; Make `pio device monitor` echo typed chars locally and send LF on Enter.
; Keeps the firmware Serial output clean — no echo bytes coming back —
; so programmatic senders (GUI, Central, scripts) don't have to parse echoes.
monitor_echo = yes
monitor_eol = LF
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    adafruit/Adafruit NeoPixel@^1.12.0
    ; NOTE: no ESP32Servo. SERVO_MOTOR drives LEDC directly — version-agnostic
    ; and no external coupling.
board_build.filesystem = littlefs

; ---------- Peripheral — Waveshare ESP32-S3-Zero ----------
[env:peripheral-s3]
; ESP32-S3FN4R2: 4MB flash + 2MB QSPI PSRAM.
; Override the devkitc-1 defaults that assume 16MB flash and OPI PSRAM.
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
; QIO flash + QSPI PSRAM (NOT OPI PSRAM — that was causing the boot loop).
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
; Default S3 partition table assumes 16MB flash (LittleFS ends up past 4MB).
; `default.csv` from arduino-esp32 is the standard 4MB layout:
;   app0 1.25MB + app1 1.25MB (OTA) + spiffs/littlefs 1.375MB.
board_build.partitions = default.csv
build_src_filter = +<peripheral/>
; I2C pins must not overlap with any element GPIO in config.json.
; GPIO 8 (SDA) / GPIO 9 (SCL) — variant defaults, clear of strapping (0,3),
; USB (19,20), LED (21).  Wire.setPins() is used to set these; do NOT pass
; them to Wire.begin() directly — that hangs on arduino-esp32 v2.x (IDF
; GPIO state set by initPins conflicts with the slave driver reconfiguring
; the same pins).  Servos/PWM should use GPIO 1-7 and 10+ to stay clear.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DI2C_SDA_PIN_GPIO=8
    -DI2C_SCL_PIN_GPIO=9
;   Status LED = GPIO 21 (onboard WS2812, NEO_RGB wiring)

; ---------- Peripheral — ESP32-S3-Zero I2C smoke-test ----------
; Minimal slave: no LittleFS, no LEDC, no elements, no JSON.
; Flash: pio run -e peripheral-s3-test -t upload
[env:peripheral-s3-test]
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.partitions = default.csv
build_src_filter = +<i2c-test/>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DI2C_TEST_SDA_PIN=8
    -DI2C_TEST_SCL_PIN=9
    -DI2C_TEST_SLAVE_ADDR=0x13

; ---------- Central — Waveshare ESP32-S3-Zero ----------
[env:central]
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.partitions = default.csv
build_src_filter = +<central/>
; I2C: GPIO 8 (SDA) / GPIO 9 (SCL) — same as peripheral, so the physical
; wire mapping is consistent across all boards.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DI2C_SDA_PIN_GPIO=8
    -DI2C_SCL_PIN_GPIO=9
;   Status LED = GPIO 21 (onboard WS2812, NEO_RGB wiring — same as peripheral-s3)
