; I2CElectronics PlatformIO configuration
;
; Environments:
;   peripheral-s3      : Seeed XIAO ESP32-S3 Peripheral (default)
;   peripheral-s3-test : Minimal I2C slave smoke-test (no LittleFS/elements)
;   hardware-test      : LED-cycle + I2C-slave bring-up sanity check
;   central            : Seeed XIAO ESP32-S3 Central
;
; Active board: Seeed XIAO ESP32-S3 (ESP32-S3R8: 8MB flash + 8MB octal PSRAM).
; Earlier development used the Waveshare ESP32-S3-Zero (S3FN4R2: 4MB flash +
; QSPI PSRAM, no extra overrides — see git history for those settings).
;
; Status LED is configured at runtime via /board.json status_led block —
; no build-time STATUS_LED_* flags. See lib/AOElectronics/StatusLed.h.
;
; Each env has its own LittleFS image so different board variants can
; carry their own /board.json (status_led + pins block) without
; interfering. Layout: data/<env-name>/. The `data_dir` setting below
; uses ${PIOENV} to pick the right subdir at build time.
; (PIO note: data_dir is a [platformio]-section option only — per-env
; data_dir = ... is silently ignored.)
;
; To add a new physical variant (e.g. a bare XIAO on a breadboard with
; a different pin map), add a new env that extends one of the base envs
; and create a matching data/<env-name>/ directory with its own
; board.json + config.json:
;
;   [env:peripheral-s3-bare]
;   extends = env:peripheral-s3
;
; ... then drop board.json + config.json into data/peripheral-s3-bare/.
;
; See: https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = peripheral-s3
data_dir = ${PROJECT_DIR}/data/${PIOENV}

; ---------- Common to all environments ----------
[env]
; espressif32 6.9.0 ships arduino-esp32 2.0.17 (IDF 4.4.x).
; platform_packages pins the framework to the original 3.20017.0 release
; (Jun 2024) rather than the later 3.20017.241212+sha.dcc1105b rebuild
; (Dec 2024) which appears to have regressions in Wire slave mode on S3.
platform = espressif32 @ 6.9.0
platform_packages =
    framework-arduinoespressif32 @ ==3.20017.0
framework = arduino
board = seeed_xiao_esp32s3
monitor_speed = 115200
; Make `pio device monitor` echo typed chars locally and send LF on Enter.
; Keeps the firmware Serial output clean — no echo bytes coming back —
; so programmatic senders (GUI, Central, scripts) don't have to parse echoes.
monitor_echo = yes
monitor_eol = LF
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    adafruit/Adafruit NeoPixel@^1.12.0
    ; NOTE: no ESP32Servo. SERVO_MOTOR drives LEDC directly — version-agnostic
    ; and no external coupling.
board_build.filesystem = littlefs

; ---------- Peripheral — XIAO ESP32-S3 (Dave's custom breakout PCB) ----------
[env:peripheral-s3]
build_src_filter = +<peripheral/>
; LittleFS image source: data/peripheral-s3/ (see [platformio] data_dir).
; I2C: GPIO 5 (SDA, D4) / GPIO 6 (SCL, D5) — the XIAO silkscreen-labelled
; defaults. Wire.setPins() is used (not Wire.begin(addr, sda, scl) directly)
; to avoid the IDF GPIO-state conflict that hangs the slave driver on
; arduino-esp32 v2.x. Servos / PWM should pick from the remaining XIAO
; header pins: 1, 2, 3, 4, 7, 8, 9, 21, 43, 44 (avoid GPIO 5/6 = I2C, 0
; = BOOT, 19/20 = native USB, and any pin used by the status LED).
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DI2C_SDA_PIN_GPIO=5
    -DI2C_SCL_PIN_GPIO=6

; ---------- Peripheral — XIAO ESP32-S3 I2C smoke-test ----------
; Minimal slave: no LittleFS, no LEDC, no elements, no JSON.
; Flash: pio run -e peripheral-s3-test -t upload
[env:peripheral-s3-test]
build_src_filter = +<i2c-test/>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DI2C_TEST_SDA_PIN=5
    -DI2C_TEST_SCL_PIN=6
    -DI2C_TEST_SLAVE_ADDR=0x13

; ---------- Hardware-test — XIAO ESP32-S3 ----------
; Cycles the on-board NeoPixel through clearly-distinct per-channel
; patterns (green fade → red blink → blue pulse → white) and exposes
; an I2C slave at 0x14 so a Central can confirm the board is alive.
; No LittleFS, no element factory — purely WS2812 + Wire so that any
; observed misbehaviour can be attributed to hardware/wiring or the
; underlying Adafruit_NeoPixel layer, not to our own indicator code.
; Flash: pio run -e hardware-test -t upload
[env:hardware-test]
build_src_filter = +<hardware-test/>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLED_TEST_PIN=9
    -DLED_TEST_COUNT=1
    -DI2C_TEST_SDA_PIN=5
    -DI2C_TEST_SCL_PIN=6
    -DI2C_TEST_SLAVE_ADDR=0x14

; ---------- Central — XIAO ESP32-S3 ----------
[env:central]
build_src_filter = +<central/>
; LittleFS image source: data/central/ (see [platformio] data_dir).
; I2C: GPIO 5 (SDA) / GPIO 6 (SCL) — same wiring convention as peripheral.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DI2C_SDA_PIN_GPIO=5
    -DI2C_SCL_PIN_GPIO=6
